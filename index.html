<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Victor Gonzalez - Blog</title>
    <link rel="stylesheet" href="assets/css/main.css">
    <style>
        /* Custom styles for the blog page */
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
        }

        #wrapper {
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        header, footer {
            background-color: #2f27ce;
            color: #fff;
            padding: 20px;
            text-align: center;
        }

        nav {
            background-color: #dedcff;
            padding: 10px 0;
        }

        nav ul {
            list-style-type: none;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
        }

        nav ul li {
            margin-right: 20px;
        }

        nav ul li a {
            color: #050315;
            text-decoration: none;
            padding: 5px 10px;
            border-radius: 5px;
            transition: background-color 0.3s ease;
        }

        nav ul li a:hover {
            background-color: #433bff;
        }

        #main {
            flex: 1;
            padding: 20px;
        }

        .blog-post {
            background-color: #fbfbfe;
            padding: 20px;
            margin-bottom: 20px;
            border-radius: 5px;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
        }

        .blog-post h3 {
            margin-top: 0;
        }

        footer {
            margin-top: auto;
        }
    </style>
</head>
<body>

    <!-- Wrapper -->
    <div id="wrapper">

        <!-- Header -->
        <header>
            <h1>Victor Gonzalez</h1>
            <p>Welcome to my blog</p>
        </header>

        <!-- Navigation -->
        <nav>
            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="about.html">About</a></li>
                <li><a href="blog.html">Blog</a></li>
                <li><a href="contact.html">Contact</a></li>
            </ul>
        </nav>

        <!-- Main Content -->
        <div id="main">
            <!-- Blog Posts -->
            <section id="blog">
                <div class="inner">
                    <h2>Latest Blog Posts</h2>
                    <div class="blog-post">
                        <h3>Sample Blog Post 1</h3>
                        <p>This is the content of the first blog post.</p>
                    </div>
                    <div class="blog-post">
                        <h3>Sample Blog Post 2</h3>
                        <p>This is the content of the second blog post.</p>
                    </div>
                    <!-- Add more blog posts here -->
                </div>
            </section>
        </div>

        <!-- Footer -->
        <footer>
            <p>&copy; 2024 Victor Gonzalez. All rights reserved.</p>
        </footer>

    </div>

</body>
</html>
